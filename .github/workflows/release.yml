name: Release

# Tag-driven. Push a tag like `v0.1.0` (or `v0.1.0-beta1` for a
# pre-release) and this workflow:
#   1. Bumps the plugin header + Version constant + readme.txt stable
#      tag to match the tag.
#   2. composer install --no-dev so vendor/ contains only runtime deps.
#   3. Packages everything into taptap-pay-<tag>.zip.
#   4. Cuts a GitHub Release with the zip as a release asset.
#
# Plugin Update Checker on each installed store reads this release
# feed, picks up the new tag, downloads the zip asset (matched by the
# pattern in includes/UpdateChecker.php), and offers the update.

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build + release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: curl, json, mbstring
          coverage: none
          tools: composer:v2

      - name: Derive version (strip leading v)
        id: version
        run: |
          tag='${{ github.ref_name }}'
          echo "value=${tag#v}" >> "$GITHUB_OUTPUT"
          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version strings in source
        run: |
          set -euo pipefail
          v='${{ steps.version.outputs.value }}'
          sed -i "s|^ \* Version:           [0-9].*|* Version:           ${v}|" taptap-pay.php
          sed -i "s|define('TAPTAP_PAY_VERSION', '[^']*');|define('TAPTAP_PAY_VERSION', '${v}');|" taptap-pay.php
          sed -i "s|^Stable tag: .*|Stable tag: ${v}|" readme.txt

      - name: Composer install (runtime only)
        run: composer install --no-dev --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Lint
        run: |
          find . -path ./vendor/composer -prune -o -path ./vendor/yahnis-elsts -prune -o -type f -name '*.php' -print \
            | xargs -n1 -P4 php -l > /dev/null

      - name: Build zip
        id: zip
        run: |
          set -euo pipefail
          v='${{ steps.version.outputs.value }}'
          asset="taptap-pay-${v}.zip"
          # Stage into a directory named `taptap-pay` so the zip
          # extracts into wp-content/plugins/taptap-pay/ on install.
          rm -rf build && mkdir -p build/taptap-pay
          rsync -a --exclude='/.git*' \
                    --exclude='/build' \
                    --exclude='/.github' \
                    --exclude='/tests' \
                    --exclude='/.phpunit*' \
                    --exclude='/CHANGELOG.md' \
                    --exclude='/README.md' \
                    --exclude='/composer.lock' \
                    ./ build/taptap-pay/
          (cd build && zip -qr "../${asset}" taptap-pay)
          echo "path=${asset}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          flags=()
          if [[ '${{ steps.version.outputs.prerelease }}' == 'true' ]]; then
            flags+=(--prerelease)
          fi
          gh release create '${{ github.ref_name }}' \
            --title '${{ github.ref_name }}' \
            --generate-notes \
            "${flags[@]}" \
            '${{ steps.zip.outputs.path }}'
